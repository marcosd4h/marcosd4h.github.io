---
layout: default
---
<article class="post-shell">
  <a class="back-link" href="{{ "/" | relative_url }}">{{ site.theme_config.back_home_text }}</a>
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-date">{{ page.date | date: site.theme_config.date_format }}</p>
  {{ content }}
</article>
